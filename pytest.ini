[pytest]
# Add project root to sys.path so `from app import app` resolves
# regardless of how pytest is invoked (`pytest`, `python -m pytest`,
# or via CI runners that don't pass through `python -m`).
pythonpath = .
testpaths = tests
asyncio_mode = auto
# Single event loop for the whole session — asyncpg pool bindings hate
# being torn down per-test.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
