name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff==0.15.12
      - run: ruff check .

  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction_dev_password
          POSTGRES_DB: auction_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auction -d auction_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://auction:auction_dev_password@localhost:5432/auction_test
          AUCTION_SECRET_KEY: ci-test-secret-key-not-for-prod
        # Catch out-of-sync migrations before tests do — pytest's
        # conftest skips alembic and goes straight to ``create_all``,
        # so without this step a broken migration would only be found
        # in production.
        run: alembic upgrade head

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://auction:auction_dev_password@localhost:5432/auction_test
          AUCTION_SECRET_KEY: ci-test-secret-key-not-for-prod
        run: pytest -v
