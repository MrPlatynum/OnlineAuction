<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <title>Новый пароль - Лотус</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/common.css">
  <style>
    .pw-reset-wrap {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .pw-reset-card {
      max-width: 440px;
      width: 100%;
      background: var(--bg-2, #0f1722);
      border: 1px solid var(--border, #223147);
      border-radius: 20px;
      padding: 36px 32px;
    }
    .pw-reset-icon {
      font-size: 44px;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1;
    }
    .pw-reset-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin: 0 0 10px 0;
      color: var(--text-1, #eaf2ff);
    }
    .pw-reset-hint {
      color: var(--text-2, #9fb0c2);
      line-height: 1.5;
      text-align: center;
      margin: 0 0 24px 0;
      font-size: 14px;
    }
    .pw-reset-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .pw-reset-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2, #9fb0c2);
    }
    .pw-reset-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-3, #151f2e);
      border: 1px solid var(--border, #223147);
      border-radius: 10px;
      color: var(--text-1, #eaf2ff);
      font-size: 15px;
      font-family: inherit;
    }
    .pw-reset-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2dd4bf, #a78bfa);
      color: #0b0f14;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
    .pw-reset-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .pw-reset-msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      display: none;
    }
    .pw-reset-msg.ok { background: rgba(34,197,94,0.1); color: #22c55e; display: block; }
    .pw-reset-msg.err { background: rgba(239,68,68,0.1); color: #ef4444; display: block; }
    .pw-reset-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
    }
    .pw-reset-footer a { color: #2dd4bf; text-decoration: none; }
    .pw-reset-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <div class="nav-logo-icon"></div>
      <span class="nav-logo-text">Лотус</span>
    </a>
    <div class="flex-1"></div>
  </div>
</header>

<div class="pw-reset-wrap">
  <form class="pw-reset-card" id="resetForm">
    <div class="pw-reset-icon">🔑</div>
    <div class="pw-reset-title">Новый пароль</div>
    <div class="pw-reset-hint" id="resetHint">
      Введите новый пароль для аккаунта. После сброса все активные
      сессии будут разлогинены - войдите заново.
    </div>
    <div class="pw-reset-field">
      <label class="pw-reset-label" for="newPassword">Новый пароль</label>
      <input class="pw-reset-input" id="newPassword" type="password" required minlength="8" maxlength="128" autocomplete="new-password" placeholder="Минимум 8 символов">
    </div>
    <div class="pw-reset-field">
      <label class="pw-reset-label" for="confirmPassword">Подтверждение</label>
      <input class="pw-reset-input" id="confirmPassword" type="password" required minlength="8" maxlength="128" autocomplete="new-password" placeholder="Повторите пароль">
    </div>
    <button class="pw-reset-btn" id="resetSubmit" type="submit">Сбросить пароль</button>
    <div class="pw-reset-msg" id="resetMsg"></div>
    <div class="pw-reset-footer">
      <a href="index.html">← На главную</a>
    </div>
  </form>
</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/password-reset.js"></script>
</body>
</html>
