services:
  postgres:
    image: postgres:16-alpine
    container_name: auction_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction_dev_password
      POSTGRES_DB: auction
    ports:
      # Bind to loopback so the dev container's hard-coded credentials
      # aren't reachable from anything outside the host. The default
      # ``"5433:5432"`` shorthand binds 0.0.0.0:5433, which on a
      # shared dev machine (or any host with a public interface) lets
      # anyone on the same network log into the DB as
      # auction / auction_dev_password.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
